<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switch Showcase</title>
    <link rel="stylesheet" href="../css/globals.css">
    <link rel="stylesheet" href="../components/switch/switch.css">
    <link rel="stylesheet" href="../components/button/button.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            margin: 0;
        }

        section {
            margin-bottom: 3rem;
        }

        h2 {
            font-size: 1.25rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .row {
            display: flex;
            gap: 2rem;
            align-items: center;
            margin-bottom: 1rem;
        }

        code {
            background: var(--secondary);
            padding: 0.2rem 0.4rem;
            border-radius: var(--radius-sm);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Switch</h1>
            <button id="theme-toggle" class="btn btn-icon btn-ghost" aria-label="Toggle theme">
                <i data-lucide="sun" class="dark:hidden"></i>
                <i data-lucide="moon" class="hidden dark:block"></i>
            </button>
        </div>
        <p style="color: var(--muted-foreground); margin-bottom: 2rem;">Accessible switch component.</p>

        <section>
            <h2>1. Basic</h2>
            <div class="row">
                <button id="sw-1" role="switch" aria-checked="false" aria-label="Notifications"></button>
                <button id="sw-2" role="switch" aria-checked="true" aria-label="Auto-save"></button>
            </div>
        </section>

        <section>
            <h2>2. Sizes</h2>
            <div class="row">
                <button id="sw-sm" class="switch-sm" role="switch" aria-checked="false"
                    aria-label="Small switch"></button>
                <button id="sw-md" role="switch" aria-checked="false" aria-label="Default switch"></button>
                <button id="sw-lg" class="switch-lg" role="switch" aria-checked="false"
                    aria-label="Large switch"></button>
            </div>
        </section>

        <section>
            <h2>3. With Labels</h2>
            <div
                style="display: flex; align-items: center; justify-content: space-between; padding: 1rem; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 0.5rem;">
                <span id="label-wifi">Wi-Fi</span>
                <button id="sw-wifi" role="switch" aria-checked="true" aria-labelledby="label-wifi"></button>
            </div>
            <div
                style="display: flex; align-items: center; justify-content: space-between; padding: 1rem; border: 1px solid var(--border); border-radius: var(--radius);">
                <span id="label-bt" style="color: var(--muted-foreground);">Bluetooth</span>
                <button id="sw-bt" role="switch" aria-checked="false" disabled aria-labelledby="label-bt"></button>
            </div>
        </section>
    </div>

    <script type="module">
        import { initTheme, toggleTheme } from '../js/theme.js';
        import { switchToggle } from '../components/switch/switch.js';

        initTheme();
        lucide.createIcons();
        document.getElementById('theme-toggle').addEventListener('click', () => {
            toggleTheme();
            lucide.createIcons();
        });

        // Initialize switches
        ['sw-1', 'sw-2', 'sw-sm', 'sw-md', 'sw-lg', 'sw-wifi', 'sw-bt'].forEach(id => {
            const el = document.getElementById(id);
            if (el) switchToggle(el);
        });
    </script>
</body>

</html>
