<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Showcase</title>
    <link rel="stylesheet" href="../css/globals.css">
    <link rel="stylesheet" href="../components/button/button.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            margin: 0;
        }

        section {
            margin-bottom: 3rem;
        }

        h2 {
            font-size: 1.25rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .row {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 1rem;
        }

        code {
            background: var(--secondary);
            padding: 0.2rem 0.4rem;
            border-radius: var(--radius-sm);
        }

        .label {
            font-size: 0.75rem;
            color: var(--muted-foreground);
            margin-bottom: 0.5rem;
            display: block;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Button</h1>
            <button id="theme-toggle" class="btn btn-ghost btn-icon" aria-label="Toggle theme">
                <i data-lucide="sun" class="dark:hidden"></i>
                <i data-lucide="moon" class="hidden dark:block"></i>
            </button>
        </div>
        <p style="color: var(--muted-foreground); margin-bottom: 2rem;">Button variants, sizes, and states.</p>

        <section>
            <h2>1. Variants</h2>
            <div class="row">
                <button class="btn">Default (Primary)</button>
                <button class="btn btn-secondary">Secondary</button>
                <button class="btn btn-outline">Outline</button>
                <button class="btn btn-ghost">Ghost</button>
                <button class="btn btn-plain">Plain</button>
                <button class="btn btn-destructive">Destructive</button>
                <button class="btn btn-link">Link</button>
            </div>
        </section>

        <section>
            <h2>2. Sizes</h2>
            <div class="row" style="align-items: flex-end;">
                <div>
                    <span class="label">Small (32px / 2rem)</span>
                    <button class="btn btn-sm">Small</button>
                </div>
                <div>
                    <span class="label">Default (36px / 2.25rem)</span>
                    <button class="btn">Default</button>
                </div>
                <div>
                    <span class="label">Large (40px / 2.5rem)</span>
                    <button class="btn btn-lg">Large</button>
                </div>
            </div>
        </section>

        <section>
            <h2>3. Icon Buttons</h2>
            <div class="row" style="align-items: flex-end;">
                <div>
                    <span class="label">Small</span>
                    <button class="btn btn-icon-sm btn-outline" aria-label="Small icon"><i
                            data-lucide="plus"></i></button>
                </div>
                <div>
                    <span class="label">Default</span>
                    <button class="btn btn-icon btn-outline" aria-label="Default icon"><i
                            data-lucide="home"></i></button>
                </div>
                <div>
                    <span class="label">Large</span>
                    <button class="btn btn-icon-lg btn-outline" aria-label="Large icon"><i
                            data-lucide="settings"></i></button>
                </div>
                <div>
                    <span class="label">Rounded</span>
                    <button class="btn btn-icon btn-ghost rounded-full" aria-label="Rounded ghost"><i
                            data-lucide="bell"></i></button>
                </div>
            </div>
        </section>

        <section>
            <h2>4. With Icons</h2>
            <div class="row">
                <button class="btn"><i data-lucide="save"></i> Save</button>
                <button class="btn btn-secondary">Next <i data-lucide="chevron-right"></i></button>
                <button class="btn btn-outline" disabled><i data-lucide="loader-2"></i> Loading</button>
            </div>
        </section>

        <section>
            <h2>5. Special Widths</h2>
            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <div>
                    <span class="label">Wide</span>
                    <button class="btn btn-wide">Wide Button</button>
                </div>
                <div>
                    <span class="label">Block</span>
                    <button class="btn btn-block btn-outline">Block Button (Full Width)</button>
                </div>
            </div>
        </section>
    </div>

    <script type="module">
        import { initTheme, toggleTheme } from '../js/theme.js';
        initTheme();
        lucide.createIcons();
        document.getElementById('theme-toggle').addEventListener('click', () => {
            toggleTheme();
            lucide.createIcons();
        });
    </script>
</body>

</html>
