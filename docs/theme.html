<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Switcher</title>
    <link rel="stylesheet" href="../css/globals.css">
    <link rel="stylesheet" href="../components/switch/switch.css">
    <link rel="stylesheet" href="../components/button/button.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            margin: 0;
        }

        p {
            color: var(--muted-foreground);
            margin-bottom: 2rem;
        }

        .theme-card {
            padding: 2rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
        }

        .theme-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .theme-label {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .theme-label span:first-child {
            font-weight: 500;
        }

        .theme-label span:last-child {
            font-size: 0.875rem;
            color: var(--muted-foreground);
        }

        .color-demo {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
            margin-top: 1.5rem;
        }

        .color-swatch {
            aspect-ratio: 1;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.625rem;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Theme</h1>
            <button id="theme-toggle" class="btn btn-icon btn-ghost" aria-label="Toggle theme">
                <i data-lucide="sun" class="dark:hidden"></i>
                <i data-lucide="moon" class="hidden dark:block"></i>
            </button>
        </div>
        <p>Color palette and typography preview.</p>

        <div class="theme-card">
            <div class="theme-row">
                <div class="theme-label">
                    <span>Dark Mode</span>
                    <span>Switch between light and dark themes</span>
                </div>
                <!-- Also keep the switch demo here as it's relevant context -->
                <button id="theme-switch" role="switch" aria-checked="false"></button>
            </div>

            <hr style="border: none; border-top: 1px solid var(--border); margin: 1.5rem 0;">

            <div class="theme-label">
                <span>Color Palette</span>
                <span>Current theme variables</span>
            </div>

            <div class="color-demo">
                <div class="color-swatch"
                    style="background: var(--background); color: var(--foreground); border: 1px solid var(--border);">bg
                </div>
                <div class="color-swatch" style="background: var(--foreground); color: var(--background);">fg</div>
                <div class="color-swatch" style="background: var(--primary); color: var(--primary-foreground);">pri
                </div>
                <div class="color-swatch" style="background: var(--secondary); color: var(--secondary-foreground);">sec
                </div>
                <div class="color-swatch" style="background: var(--muted); color: var(--muted-foreground);">mut</div>
                <div class="color-swatch" style="background: var(--accent); color: var(--accent-foreground);">acc</div>
                <div class="color-swatch" style="background: var(--destructive); color: #fff;">des</div>
                <div class="color-swatch"
                    style="background: var(--card); color: var(--card-foreground); border: 1px solid var(--border);">crd
                </div>
            </div>
        </div>

        <div style="margin-top: 2rem; display: flex; gap: 1rem;">
            <button class="btn">Default</button>
            <button class="btn btn-primary">Primary</button>
            <button class="btn btn-outline">Outline</button>
            <button class="btn btn-ghost">Ghost</button>
        </div>
    </div>

    <script type="module">
        import { initTheme, toggleTheme, getTheme } from '../js/theme.js';
        import { switchToggle } from '../components/switch/switch.js';

        // Init theme
        initTheme();
        lucide.createIcons();

        // Setup top toggle button
        document.getElementById('theme-toggle').addEventListener('click', () => {
            const isDark = toggleTheme();
            updateControls(isDark);
            lucide.createIcons();
        });

        // Setup switch toggle
        const sw = document.getElementById('theme-switch');
        const ctrl = switchToggle(sw, {
            checked: getTheme() === 'dark',
            onChange: (isDark) => {
                if (isDark) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                updateControls(isDark);
                lucide.createIcons();
            }
        });

        function updateControls(isDark) {
            // Sync switch state if it exists
            const sw = document.getElementById('theme-switch');
            if (sw) {
                sw.setAttribute('aria-checked', isDark);
            }
        }
    </script>
</body>

</html>
