<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Showcase</title>
    <link rel="stylesheet" href="../css/globals.css">
    <link rel="stylesheet" href="../components/modal/modal.css">
    <link rel="stylesheet" href="../components/button/button.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            margin: 0;
        }

        section {
            margin-bottom: 3rem;
        }

        h2 {
            font-size: 1.25rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        code {
            background: var(--secondary);
            padding: 0.2rem 0.4rem;
            border-radius: var(--radius-sm);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Modal</h1>
            <button id="theme-toggle" class="btn btn-icon btn-ghost" aria-label="Toggle theme">
                <i data-lucide="sun" class="dark:hidden"></i>
                <i data-lucide="moon" class="hidden dark:block"></i>
            </button>
        </div>
        <p style="color: var(--muted-foreground); margin-bottom: 2rem;">Native <code>&lt;dialog&gt;</code> element.</p>

        <section>
            <h2>1. Basic</h2>
            <button class="btn" onclick="document.getElementById('modal-1').showModal()">Open Modal</button>
            <dialog id="modal-1">
                <h3 style="margin-bottom: 1rem;">Basic Modal</h3>
                <p>This uses the native dialog element with focus trapping and backdrop.</p>
                <footer style="margin-top: 1.5rem; display: flex; justify-content: flex-end;">
                    <button class="btn" onclick="document.getElementById('modal-1').close()">Close</button>
                </footer>
            </dialog>
        </section>

        <section>
            <h2>2. With Form</h2>
            <button class="btn btn-primary" onclick="document.getElementById('modal-2').showModal()">Edit
                Profile</button>
            <dialog id="modal-2">
                <h3 style="margin-bottom: 1rem;">Edit Profile</h3>
                <form method="dialog" style="display: flex; flex-direction: column; gap: 1rem;">
                    <div>
                        <label style="display: block; margin-bottom: 0.25rem;">Name</label>
                        <input type="text" value="John Doe"
                            style="width: 100%; padding: 0.5rem; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--background); color: var(--foreground);">
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 0.25rem;">Email</label>
                        <input type="email" value="john@example.com"
                            style="width: 100%; padding: 0.5rem; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--background); color: var(--foreground);">
                    </div>
                    <div style="display: flex; justify-content: flex-end; gap: 0.5rem;">
                        <button type="button" class="btn btn-ghost"
                            onclick="document.getElementById('modal-2').close()">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save</button>
                    </div>
                </form>
            </dialog>
        </section>

        <section>
            <h2>3. Confirmation</h2>
            <button class="btn btn-destructive" onclick="document.getElementById('modal-3').showModal()">
                <i data-lucide="trash-2"></i> Delete
            </button>
            <dialog id="modal-3">
                <h3 style="margin-bottom: 0.5rem;">Are you sure?</h3>
                <p style="color: var(--muted-foreground);">This action cannot be undone.</p>
                <div style="display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 1.5rem;">
                    <button class="btn btn-ghost" onclick="document.getElementById('modal-3').close()">Cancel</button>
                    <button class="btn btn-destructive"
                        onclick="document.getElementById('modal-3').close()">Delete</button>
                </div>
            </dialog>
        </section>
    </div>

    <script type="module">
        import { initTheme, toggleTheme } from '../js/theme.js';
        initTheme();
        lucide.createIcons();
        document.getElementById('theme-toggle').addEventListener('click', () => {
            toggleTheme();
            lucide.createIcons();
        });
    </script>
</body>

</html>
