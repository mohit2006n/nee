<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Separator Showcase</title>
    <link rel="stylesheet" href="../css/globals.css">
    <link rel="stylesheet" href="../components/separator/separator.css">
    <link rel="stylesheet" href="../components/button/button.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            margin: 0;
        }

        section {
            margin-bottom: 3rem;
        }

        h2 {
            font-size: 1.25rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .flex-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            height: 2rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Separator</h1>
            <button id="theme-toggle" class="btn btn-icon btn-ghost" aria-label="Toggle theme">
                <i data-lucide="sun" class="dark:hidden"></i>
                <i data-lucide="moon" class="hidden dark:block"></i>
            </button>
        </div>
        <p style="color: var(--muted-foreground); margin-bottom: 2rem;">Horizontal and vertical dividers.</p>

        <section>
            <h2>1. Horizontal</h2>
            <p>Content above</p>
            <hr>
            <p>Content below</p>
        </section>

        <section>
            <h2>2. Vertical</h2>
            <div class="flex-row">
                <span>Home</span>
                <div role="separator" aria-orientation="vertical"></div>
                <span>About</span>
                <div role="separator" aria-orientation="vertical"></div>
                <span>Contact</span>
            </div>
        </section>

        <section>
            <h2>3. With Text</h2>
            <div class="separator-with-text"><span>or continue with</span></div>
        </section>

        <section>
            <h2>4. Decorative</h2>
            <p>When using purely for decoration, use <code>role="none"</code>.</p>
            <hr role="none">
        </section>
    </div>

    <script type="module">
        import { initTheme, toggleTheme } from '../js/theme.js';
        initTheme();
        lucide.createIcons();
        document.getElementById('theme-toggle').addEventListener('click', () => {
            toggleTheme();
            lucide.createIcons();
        });
    </script>
</body>

</html>
